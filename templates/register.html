<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
}

.container{
    width:420px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    color:white;
}

.container h2{
    text-align:center;
    margin-bottom:10px;
    font-size:2rem;
}

.subtitle{
    text-align:center;
    color:#dbeafe;
    margin-bottom:30px;
}

.input-box{
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    outline:none;
    font-size:15px;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#16a34a;
}

.link{
    text-align:center;
    margin-top:20px;
}

.link a{
    color:#93c5fd;
    text-decoration:none;
}

.link a:hover{
    text-decoration:underline;
}

.security-box{
    margin-top:25px;
    padding:15px;
    background:rgba(255,255,255,0.08);
    border-radius:12px;
    text-align:center;
    font-size:14px;
    color:#dbeafe;
}

</style>
</head>
<body>

<div class="container">

<h2>📝 Create Account</h2>

<p class="subtitle">
Secure Coding Review Project
</p>

<form method="POST">

<div class="input-box">
<input type="text"
       name="username"
       placeholder="Enter Username"
       required>
</div>

<div class="input-box">
<input type="password"
       name="password"
       placeholder="Enter Password"
       required>
</div>

<button class="btn" type="submit">
Register
</button>

</form>

<div class="link">
Already have an account?
<a href="/login">Login</a>
</div>

<div class="security-box">
🛡️ Educational Vulnerable Application for Secure Coding Review
</div>

</div>

</body>
</html>
